<!DOCTYPE html>
<html lang="ko">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>리뷰 작성</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <div class="card">
        <h1>영화 리뷰 작성</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label>영화 제목</label>
                <input type="text" name="title" value="{{ review.title }}">
            </div>

            <div class="field">
                <label>개봉 년도</label>
                <input type="number" name="release_year" value="{{ review.release_year }}">
            </div>

            <div class="field">
                <label>장르</label>
                <input type="text" name="genre" value="{{ review.genre }}">
            </div>

            <div class="field">
                <label>별점 (0~5)</label>
                <input type="number" step="0.1" min="0" max="5" name="rating" value="{{ review.rating }}">
            </div>

            <div class="field">
                <label>감독</label>
                <input type="text" name="director" value="{{ review.director }}">
            </div>

            <div class="field">
                <label>주연</label>
                <input type="text" name="main_actor" value="{{ review.main_actor }}">
            </div>

            <div class="field">
                <label>러닝타임 (분)</label>
                <input type="number" name="running_time" value="{{ review.running_time }}">
            </div>

            <div class="field">
                <label>리뷰 내용</label>
                <textarea name="content">{{ review.content }}</textarea>
            </div>

            <button type="submit" class="btn">저장</button>

        </form>
    </div>

</body>
</html>
